name: Build and push api

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        required: true
      ecr-repository:
        type: string
        required: true

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build_and_push:
    name: Build and push api
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Build api
        run: docker build -f deploy/Dockerfile -t ${{ inputs.ecr-repository }}:${IMAGE_TAG} .
