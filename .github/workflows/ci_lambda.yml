name: CI for Lambda

on:
  push:
    branches: [main, feat/ci_lambda]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: lambda

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read Python version
        id: python-version
        run: echo "version=$(cat .python-version)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.python-version.outputs.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Run linting
        run: uv run ruff check

      - name: Check formatting
        run: uv run ruff format --check

      - name: Run type checking
        run: uv run mypy app

      - name: Run tests with coverage
        run: |
          uv run pytest -v --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --junitxml=pytest.xml | tee pytest-coverage.txt

      - name: Pytest coverage comment
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-coverage-path: ./lambda/pytest-coverage.txt
          junitxml-path: ./lambda/pytest.xml
