name: CI/CD for api

on:
  push:
    branches: ["main", "feature/connect_to_aurora"]
    paths:
      - ".github/workflows/*api*.yml"
      - "api/**"

jobs:
  test:
    uses: ./.github/workflows/_test_api.yml
    with:
      working-directory: api

  deploy:
    needs: [test]
    uses: ./.github/workflows/_deploy_api.yml
    with:
      working-directory: api
      app-env: test
      ecr-repository: 183295408601.dkr.ecr.ap-northeast-1.amazonaws.com/api
      assume-role-arn: arn:aws:iam::183295408601:role/github-actions-api
