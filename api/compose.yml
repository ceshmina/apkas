services:
  python:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_ENV=development
    depends_on:
      - postgres
    volumes:
      - .:/project
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: apkas
      DB_USER: user
      DB_PASSWORD: password
    ports:
      - 8000:8000
    command: dev

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: apkas
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5432:5432
