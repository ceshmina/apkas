services:
  dev: &base
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
    ports:
      - 3000:3000
    volumes:
      - .:/project
    command: dev

  build:
    <<: *base
    build:
      args:
        - NODE_ENV=production
    ports: []
    command: build
